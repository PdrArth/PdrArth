# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: PdrArth
          template: classic
          commits_authoring: PdrArth, Pedro Arthur, Pedro Arthur O. Januário, 129990196+PdrArth@users.noreply.github.com, pedroarthurpdrarth@gmail.com
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_indepth_custom: Donega-Negocios-Digitais/obsidian-note-reviewer, winfrabria/saas-winfrabr-monitor-licitacao, PdrArth/ProjetoCopillot
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 15
          plugin_languages_categories: programming
          plugin_languages_colors: github
          plugin_languages_ignored: Shell, CMake, PLpgSQL, XML, JSON, Markdown, INI
          plugin_languages_limit: 8
          plugin_languages_recent_categories: programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
