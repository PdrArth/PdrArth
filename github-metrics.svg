<svg xmlns="http://www.w3.org/2000/svg" width="960" height="160" viewBox="0 0 960 160" role="img" aria-labelledby="title desc">
  <title id="title">GitHub metrics placeholder</title>
  <desc id="desc">Placeholder banner shown until the GitHub Actions workflow generates live metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <rect width="960" height="160" fill="url(#bg)" rx="24" />
  <g fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">
    <text x="48" y="68" font-size="34" font-weight="700">Pedro Arthur</text>
    <text x="48" y="104" font-size="20" opacity="0.88">Metrics banner pending GitHub Actions run</text>
    <text x="48" y="132" font-size="16" opacity="0.72">Set METRICS_TOKEN and run the Metrics workflow to replace this placeholder.</text>
  </g>
</svg>
